# compose/traefik.yaml — Traefik + Socket Proxy services
# Issue #5: Socket Proxy base service
services:
  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.4.2
    container_name: socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      PING: "1"
      VERSION: "1"
      POST: "0"
    volumes:
      - /run/user/1003/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2375/_ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
