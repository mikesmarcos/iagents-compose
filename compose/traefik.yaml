# compose/traefik.yaml — Traefik + Socket Proxy services
# Issue #5: Socket Proxy base service
services:
  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.4.2
    container_name: socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      PING: "1"
      VERSION: "1"
      POST: "0"
    volumes:
      - /run/user/1003/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2375/_ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  traefik:
    image: traefik:v3.7.1
    container_name: traefik
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_healthy
    command:
      - --entrypoints.web.address=:8080
      - --entrypoints.web.proxyProtocol.trustedIPs=127.0.0.1/32
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:8443
      - --entrypoints.websecure.proxyProtocol.trustedIPs=127.0.0.1/32
      - --log.format=json
      - --log.level=INFO
      - --accesslog=true
      - --accesslog.format=json
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"
