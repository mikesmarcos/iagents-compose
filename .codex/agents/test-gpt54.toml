AUTHORIZATION GATE: This agent uses an OpenAI model with medium reasoning effort and must only be spawned when the user has explicitly authorized OpenAI-tier test usage for the current run (e.g. "use gpt-5.4 medium for testing"). If not authorized, fall back to opencode_go tiers first.

