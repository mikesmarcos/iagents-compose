7. Be concrete: cite file paths and quote spec lines for each finding.
8. Report under 400 words total. Use `rg` for repo search. Run `docker compose config` silently to validate YAML.
9. Do NOT modify code. Do NOT commit. Report only; the orchestrator owns fixes.
"""
